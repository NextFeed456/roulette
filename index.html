<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルーレットツール｜NextFeed</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: #fff;
  text-align: center;
}

textarea {
  width: 90%;
  height: 120px;
  border-radius: 8px;
  padding: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 12px 20px;
  font-size: 18px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#wheelWrapper {
  position: relative;
  display: inline-block;
  margin-top: 20px;
}

canvas {
  border-radius: 50%;
}

#result {
  margin-top: 20px;
  font-size: 28px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>ルーレットツール</h2>

<textarea id="items" placeholder="改行で項目を入力"></textarea>

<br>
<button onclick="startRoulette()">START</button>
<button onclick="toggleMute()">🔊 ミュート</button>

<br>
<input type="file" id="bgUpload" accept="image/*">

<div id="wheelWrapper">

  <!-- ルーレット -->
  <canvas id="wheel" width="500" height="500"></canvas>

  <!-- 針（右） -->
  <div style="
    position: absolute;
    top: 50%;
    right: -15px;
    transform: translateY(-50%) rotate(90deg);
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 25px solid red;
  "></div>

</div>

<div id="result"></div>

<audio id="rollSound" src="roll.mp3"></audio>
<audio id="hitSound" src="finish.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let items = [];
let angle = 0;
let spinning = false;
let muted = false;

// 音量設定
const rollSound = document.getElementById("rollSound");
const hitSound = document.getElementById("hitSound");

rollSound.volume = 0.5;
hitSound.volume = 0.5;

// 入力と同時に更新
document.getElementById("items").addEventListener("input", () => {
  items = document.getElementById("items").value.split("\n").filter(v=>v);
  drawWheel();
});

function drawWheel() {
  if(items.length === 0) return;

  ctx.clearRect(0,0,500,500);

  const arc = 2 * Math.PI / items.length;

  for(let i=0;i<items.length;i++){
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i * 360 / items.length}, 70%, 50%)`;
    ctx.moveTo(250,250);
    ctx.arc(250,250,250, i*arc + angle, (i+1)*arc + angle);
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 4;

    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2 + angle);

    ctx.strokeText(items[i], 150, 5);
    ctx.fillText(items[i], 150, 5);

    ctx.restore();
  }
}

function startRoulette() {
  if(spinning) return;
  if(items.length === 0) return alert("項目を入力してください");

  spinning = true;

  if(!muted){
    rollSound.currentTime = 0;
    rollSound.play();
  }

  let speed = Math.random() * 0.5 + 0.6;

  function spin() {
    angle += speed;
    speed *= 0.985;

    drawWheel();

    if(speed > 0.002){
      requestAnimationFrame(spin);
    } else {
      spinning = false;

      rollSound.pause();
      if(!muted) hitSound.play();

      const normalized = (angle + Math.PI / 2) % (2 * Math.PI);
      const index = Math.floor((items.length - (normalized / (2*Math.PI)) * items.length) % items.length);

      document.getElementById("result").innerText = "結果：" + items[index];
    }
  }

  spin();
}

// ミュート切り替え
function toggleMute(){
  muted = !muted;
  document.querySelector("button[onclick='toggleMute()']").innerText = muted ? "🔇 ミュート中" : "🔊 ミュート";
}

// 背景画像（ちゃんと描画する）
document.getElementById("bgUpload").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(){
    const img = new Image();
    img.onload = function(){
      ctx.drawImage(img, 0, 0, 500, 500);
      drawWheel();
    }
    img.src = reader.result;
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
