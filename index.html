<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ルーレットツール</title>

<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

canvas {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

textarea {
  width: 80%;
  height: 100px;
  margin-top: 20px;
}

.note {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<h2>ルーレットツール</h2>

<p class="note">
項目を入力すると自動でルーレットに反映されます。<br>
配信や企画のランダム決定にご利用ください。
</p>

<button onclick="startRoulette()">START</button>
<button onclick="toggleMute()">🔊 ミュート</button>

<div style="position: relative; display: inline-block;">

  <canvas id="wheel" width="500" height="500"></canvas>

  <!-- 右の針 -->
  <div style="
    position: absolute;
    top: 50%;
    right: -20px;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 15px solid transparent;
    border-bottom: 15px solid transparent;
    border-left: 30px solid red;
  "></div>

</div>

<div id="result"></div>

<p class="note">
※結果はランダムであり、偏りが出る場合があります。
</p>

<textarea id="items" placeholder="改行で入力"></textarea>

<audio id="rollSound" src="roll.mp3"></audio>
<audio id="hitSound" src="finish.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let items = [];
let angle = 0;
let spinning = false;
let muted = false;

const rollSound = document.getElementById("rollSound");
const hitSound = document.getElementById("hitSound");

rollSound.volume = 0.5;
hitSound.volume = 0.5;

// 初期表示（無色）
function drawEmpty() {
  ctx.clearRect(0,0,500,500);
  ctx.beginPath();
  ctx.fillStyle = "#1e293b";
  ctx.arc(250,250,250,0,Math.PI*2);
  ctx.fill();
}

drawEmpty();

// 入力で即反映
document.getElementById("items").addEventListener("input", () => {
  items = document.getElementById("items").value.split("\n").filter(v=>v);
  drawWheel();
});

function drawWheel() {
  if(items.length === 0){
    drawEmpty();
    return;
  }

  ctx.clearRect(0,0,500,500);

  const arc = 2 * Math.PI / items.length;

  for(let i=0;i<items.length;i++){
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i * 360 / items.length}, 70%, 50%)`;
    ctx.moveTo(250,250);
    ctx.arc(250,250,250, i*arc + angle, (i+1)*arc + angle);
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;

    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2 + angle);

    ctx.strokeText(items[i], 160, 5);
    ctx.fillText(items[i], 160, 5);

    ctx.restore();
  }
}

function startRoulette() {
  if(spinning) return;
  if(items.length === 0) return alert("項目を入力してください");

  spinning = true;

  if(!muted){
    rollSound.currentTime = 0;
    rollSound.play();
  }

  let speed = Math.random() * 0.6 + 0.6;

  function spin() {
    angle += speed;
    speed *= 0.985;

    drawWheel();

    if(speed > 0.002){
      requestAnimationFrame(spin);
    } else {
      spinning = false;
      rollSound.pause();
      if(!muted) hitSound.play();

      // ★ここがズレ修正の本体
      const adjusted = (angle) % (2*Math.PI);
      const index = Math.floor(
        ((2*Math.PI - adjusted) / (2*Math.PI)) * items.length
      ) % items.length;

      document.getElementById("result").innerText = "結果：" + items[index];
    }
  }

  spin();
}

function toggleMute(){
  muted = !muted;
}
</script>

</body>
</html>
