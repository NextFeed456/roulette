<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ルーレットツール｜NextFeed</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

/* ナビ */
.nav {
  background: #020617;
  padding: 12px;
  text-align: left;
}

.nav a {
  color: #22c55e;
  text-decoration: none;
  font-weight: bold;
}

/* 全体 */
.container {
  margin-top: 10px;
}

/* OBSクロマキーエリア */
#wrapper {
  display: inline-block;
  margin-top: 20px;
  padding: 15px;
  background: #00ff00;
  border-radius: 20px;
  position: relative;
}

/* キャンバス */
canvas {
  display: block;
  margin: auto;
}

/* 左 ▶ */
.pointer {
  position: absolute;
  top: 50%;
  left: -30px;
  transform: translateY(-50%);
  font-size: 40px;
  color: red;
  font-weight: bold;
}

/* 結果 */
.resultBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  border: 2px solid white;
  padding: 15px 30px;
  border-radius: 12px;
  font-size: 28px;
  display: none;
}

/* ボタン */
button {
  padding: 10px 20px;
  margin: 5px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* 説明 */
.desc {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.85;
}

/* 入力欄 */
textarea {
  width: 80%;
  height: 100px;
  margin-top: 10px;
}

/* CC表記 */
.cc {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="nav">
  <a href="https://nextfeed456.github.io/">← トップページへ</a>
</div>

<div class="container">

<h2>ルーレットツール</h2>

<p class="desc">
改行で項目を入力するとリアルタイムでルーレットに反映されます。<br>
配信・企画・罰ゲームなどにご利用ください。
</p>

<div>
  <button onclick="startRoulette()">START</button>
  <button onclick="toggleMute()" id="muteBtn">🔊</button>
</div>

<div id="wrapper">

  <canvas id="wheel" width="500" height="500"></canvas>

  <div class="pointer">▶</div>

  <div id="resultBox" class="resultBox"></div>

</div>

<p class="desc">
※完全ランダムのため結果に偏りが出る場合があります。
</p>

<p class="desc">
以下のボックスに入力してください。<br>
改行でルーレットの内容を分割できます。
</p>

<textarea id="items"></textarea>

<audio id="rollSound" src="roll.mp3"></audio>
<audio id="hitSound" src="finish.mp3"></audio>

<!-- CC表記 -->
<div class="cc">CC: NextFeed</div>

</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let items = [];
let angle = 0;
let spinning = false;
let muted = false;

const rollSound = document.getElementById("rollSound");
const hitSound = document.getElementById("hitSound");
const resultBox = document.getElementById("resultBox");
const muteBtn = document.getElementById("muteBtn");

rollSound.volume = 0.5;
hitSound.volume = 0.5;

// フォントサイズ調整
function getFontSize(text){
  const len = text.length;
  if(len <= 3) return 32;
  if(len <= 6) return 24;
  if(len <= 10) return 18;
  return 14;
}

// 初期
drawEmpty();

function drawEmpty(){
  ctx.clearRect(0,0,500,500);

  // 背景（黄緑）
  ctx.fillStyle = "#00ff00";
  ctx.fillRect(0,0,500,500);

  // ルーレット（白）
  ctx.beginPath();
  ctx.fillStyle = "#ffffff";
  ctx.arc(250,250,250,0,Math.PI*2);
  ctx.fill();

  // 縁
  ctx.lineWidth = 8;
  ctx.strokeStyle = "#0f172a";
  ctx.stroke();
}

// 入力反映
document.getElementById("items").addEventListener("input", () => {
  items = document.getElementById("items").value.split("\n").filter(v=>v);
  drawWheel();
});

function drawWheel(){
  if(items.length === 0){
    drawEmpty();
    return;
  }

  ctx.clearRect(0,0,500,500);

  // 背景（黄緑）
  ctx.fillStyle = "#00ff00";
  ctx.fillRect(0,0,500,500);

  const arc = 2*Math.PI / items.length;

  for(let i=0;i<items.length;i++){
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i*360/items.length},70%,50%)`;
    ctx.moveTo(250,250);
    ctx.arc(250,250,250,i*arc+angle,(i+1)*arc+angle);
    ctx.fill();

    const text = items[i];
    const fontSize = getFontSize(text);
    ctx.font = `${fontSize}px sans-serif`;

    ctx.fillStyle = "#000";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;

    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2 + angle);

    ctx.strokeText(text,150,5);
    ctx.fillText(text,150,5);

    ctx.restore();
  }

  // 縁
  ctx.beginPath();
  ctx.arc(250,250,250,0,Math.PI*2);
  ctx.lineWidth = 8;
  ctx.strokeStyle = "#0f172a";
  ctx.stroke();
}

function startRoulette(){
  if(spinning) return;
  if(items.length === 0) return alert("項目を入力");

  spinning = true;
  resultBox.style.display = "none";

  if(!muted){
    rollSound.currentTime = 0;
    rollSound.play().catch(()=>{});
  }

  let speed = Math.random()*0.6 + 0.6;

  function spin(){
    angle += speed;
    speed *= 0.985;

    drawWheel();

    if(speed > 0.002){
      requestAnimationFrame(spin);
    } else {
      spinning = false;

      rollSound.pause();
      if(!muted){
        hitSound.currentTime = 0;
        hitSound.play().catch(()=>{});
      }

      const arc = 2*Math.PI / items.length;
      const adjusted = (angle + Math.PI) % (2*Math.PI);

      const index = Math.floor(
        ( (2*Math.PI - adjusted) / arc )
      ) % items.length;

      resultBox.innerText = items[index];
      resultBox.style.display = "block";
    }
  }

  spin();
}

function toggleMute(){
  muted = !muted;
  muteBtn.innerText = muted ? "🔇" : "🔊";
}
</script>

</body>
</html>
