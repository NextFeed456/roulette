<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルーレットツール｜NextFeed</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: #fff;
  text-align: center;
}

.container {
  padding: 20px;
}

textarea {
  width: 90%;
  height: 120px;
  border-radius: 8px;
  padding: 10px;
  border: none;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  font-size: 18px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

canvas {
  margin-top: 20px;
  border-radius: 50%;
}

#result {
  margin-top: 20px;
  font-size: 26px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>ルーレットツール</h2>

<textarea id="items" placeholder="改行で項目を入力"></textarea>

<br>
<button onclick="startRoulette()">START</button>

<br>
<input type="file" id="bgUpload" accept="image/*">

<br>

<div style="position: relative; display: inline-block;">
  <canvas id="wheel" width="300" height="300"></canvas>

  <!-- 針（当選位置） -->
  <div style="
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 20px solid red;
  "></div>
</div>

<div id="result"></div>

</div>

<!-- ローカル音声 -->
<audio id="rollSound" src="roll.mp3"></audio>
<audio id="hitSound" src="finish.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let items = [];
let angle = 0;
let spinning = false;

function drawWheel() {
  if(items.length === 0) return;

  const arc = 2 * Math.PI / items.length;

  for(let i=0;i<items.length;i++){
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i * 360 / items.length}, 70%, 50%)`;
    ctx.moveTo(150,150);
    ctx.arc(150,150,150, i*arc + angle, (i+1)*arc + angle);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(i*arc + arc/2 + angle);
    ctx.fillText(items[i], 80, 5);
    ctx.restore();
  }
}

function startRoulette() {
  if(spinning) return;

  items = document.getElementById("items").value.split("\n").filter(v=>v);
  if(items.length === 0) return alert("項目を入力してください");

  spinning = true;

  const rollSound = document.getElementById("rollSound");
  const hitSound = document.getElementById("hitSound");

  rollSound.currentTime = 0;
  rollSound.play();

  let speed = Math.random() * 0.5 + 0.5; // 初速アップ

  function spin() {
    angle += speed;
    speed *= 0.985; // 減速をゆるく（長く回る）

    ctx.clearRect(0,0,300,300);
    drawWheel();

    if(speed > 0.002){
      requestAnimationFrame(spin);
    } else {
      spinning = false;
      rollSound.pause();
      hitSound.play();

      // 針は上（-90度位置）
      const normalized = (angle % (2*Math.PI));
      const index = Math.floor((items.length - (normalized / (2*Math.PI)) * items.length) % items.length);

      document.getElementById("result").innerText = "結果：" + items[index];
    }
  }

  spin();
}

// 背景画像
document.getElementById("bgUpload").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(){
    canvas.style.backgroundImage = `url(${reader.result})`;
    canvas.style.backgroundSize = "cover";
  };
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
